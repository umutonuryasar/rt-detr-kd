name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU PyTorch + project deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel keeps CI under 5 minutes.
          pip install --index-url https://download.pytorch.org/whl/cpu \
            torch==2.4.* torchvision==0.19.*
          pip install pytest pyyaml pillow numpy scipy pycocotools tensorboard

      - name: Run pytest
        run: pytest -q tests/
